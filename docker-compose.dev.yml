version: '3.8'

# Infrastructure services for local development.
# MongoDB is in docker-compose.mongodb.yml (run separately with: npm run mongodb:up)
# This file adds Memgraph and Redis on top.

services:
  # Memgraph Graph Database
  memgraph:
    image: memgraph/memgraph:latest
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph-data:/var/lib/memgraph
    networks:
      - veritas-network

  # Redis Cache
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - veritas-network

volumes:
  memgraph-data:
  redis-data:

networks:
  veritas-network:
    external: true
    name: veritas-network
